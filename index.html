<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kamba — Kanban</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header><h1>Kamba</h1></header>

  <section class="controls">
    <input id="newTitle" placeholder="Nueva tarea..." />
    <select id="newColumn">
      <option value="backlog">Backlog</option>
      <option value="doing">Doing</option>
      <option value="finish">Finish</option>
    </select>
    <button id="addBtn">Añadir</button>
  </section>

  <main id="board" class="board">
    <div class="col" data-col="backlog">
      <h2>Backlog</h2>
      <div class="list" id="backlog"></div>
    </div>
    <div class="col" data-col="doing">
      <h2>Doing</h2>
      <div class="list" id="doing"></div>
    </div>
    <div class="col" data-col="finish">
      <h2>Finish</h2>
      <div class="list" id="finish"></div>
    </div>
  </main>

  <footer>&copy; Kamba</footer>

  <script src="app.js"></script>
</body>
</html>
